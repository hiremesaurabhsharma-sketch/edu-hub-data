name: Auto-Update Supabase Database

on:
  schedule:
    - cron: '*/15 * * * *'  # यह हर 15 मिनट में रन होगा
  workflow_dispatch:        # यह बटन आपको इसे मैन्युअली रन करने की सुविधा देगा

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yt-dlp supabase

      - name: Run Fetch Script and Push to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fetch_videos.py  # अगर आपकी फाइल का नाम कुछ और है, तो इसे बदल लें
